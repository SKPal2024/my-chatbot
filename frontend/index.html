<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
  body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 0; }
  #chat-box { max-width: 600px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 8px; height: 400px; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .message { padding: 10px; margin: 5px 0; border-radius: 6px; max-width: 80%; }
  .user { background: #0d6efd; color: #fff; margin-left: auto; text-align: right; }
  .bot { background: #e2e3e5; color: #000; margin-right: auto; text-align: left; }
  #user-input { width: 100%; padding: 10px; box-sizing: border-box; margin-top: 10px; border-radius: 4px; border: 1px solid #ccc; }
</style>
</head>
<body>

<div id="chat-box"></div>
<input type="text" id="user-input" placeholder="Type your message and hit Enter">

<script src="script.js"></script>
</body>
</html>
